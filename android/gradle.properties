# --- Build system notes ---
# This project requires JDK 17 for Gradle. Set the path below to a JDK 17 installation.
# We increase Gradle JVM heap for R8/D8 (dexing + shrinking) to avoid OOM on low-memory machines.
# If you have limited memory (CI runner), consider using `flutter build apk --release --no-shrink`.

org.gradle.jvmargs=-Xmx3072M -Dfile.encoding=UTF-8 -XX:+UseParallelGC -XX:ReservedCodeCacheSize=512m
org.gradle.java.home=C:\\Program Files\\Java\\jdk-17
org.gradle.workers.max=1
kotlin.daemon.jvmoptions=-Xmx1024m -XX:ReservedCodeCacheSize=128m

# AndroidX + Jetifier
android.useAndroidX=true
# Jetifier disabled because project and dependencies are AndroidX-compatible. Jetifier caused "Unsupported class file major version 68" on byte-buddy.
android.enableJetifier=false