name: sevak_app
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter

  
  firebase_core: ^3.1.0
  cloud_firestore: ^5.6.12
  
  
  flutter_blue_plus: 1.31.17
  
  url_launcher: ^6.2.0
  shared_preferences: ^2.2.2
  permission_handler: ^12.0.1
  file_picker: ^8.0.0
  cupertino_icons: ^1.0.8
  intl_phone_field: ^3.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  
  flutter_launcher_icons: ^0.13.1


flutter:
  uses-material-design: true

  assets:
    - Assets/sevak_new_img.jpeg
    - Assets/SEVAK_logo.jpg



flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "Assets/SEVAK_logo.jpg"
  min_sdk_android: 21